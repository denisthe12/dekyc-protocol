name: CI Solana

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'programs/**'
      - '.github/workflows/ci-solana.yml'
  pull_request:
    branches: [main, master, develop]
    paths:
      - 'programs/**'
      - '.github/workflows/ci-solana.yml'

jobs:
  solana:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: programs/permission_protocol

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        run: |
          rustup default stable
          rustup component add rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            programs/permission_protocol/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('programs/permission_protocol/**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Rust fmt check
        run: cargo fmt --all --check

      - name: Cargo build
        run: cargo build