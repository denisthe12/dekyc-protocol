name: CI Apps

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  energy-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            apps/*/package.json

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint energy-web
        run: pnpm --filter energy-web lint

      - name: Typecheck energy-web
        run: pnpm --filter energy-web typecheck

      - name: Build energy-web
        run: pnpm --filter energy-web build

  energy-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            apps/*/package.json

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint energy-api
        run: pnpm --filter energy-api lint

      - name: Typecheck energy-api
        run: pnpm --filter energy-api typecheck

      - name: Build energy-api
        run: pnpm --filter energy-api build

  platform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            apps/*/package.json

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build platform
        run: pnpm --filter platform build

  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            apps/*/package.json

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build api
        run: pnpm --filter api build